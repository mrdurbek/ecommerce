server:
  port: 8083
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:inventory-db}:${DB_PORT:5432}/${DB_NAME:inventory_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0

# JWT
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# App config
app:
  inventory:
    reservation-expiry-minutes: 30      # Reserved stock timeout
    low-stock-check-interval-ms: 60000  # Low stock check every 1 min

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.ecommerce.inventory: DEBUG
    org.springframework.amqp: INFO
    org.hibernate.SQL: INFO

# RabbitMQ
messaging:
  exchange:
    order: order.exchange
    inventory: inventory.exchange
  queue:
    order-created: order.created.inventory.queue
    order-created-retry: order.created.inventory.retry.queue
    order-created-dlq: order.created.inventory.dead.queue
    order-cancelled: order.cancelled.inventory.queue
    order-cancelled-retry: order.cancelled.inventory.retry.queue
    order-cancelled-dlq: order.cancelled.inventory.dead.queue
    stock-reserved: stock.reserved.inventory.queue
    stock-reserved-retry: stock.reserved.inventory.retry.queue
    stock-reserved-dlq: stock.reserved.inventory.dead.queue
    stock-reservation-failed: stock.reservation.failed.inventory.queue
    stock-reservation-failed-retry: stock.reservation.failed.inventory.retry.queue
    stock-reservation-failed-dlq: stock.reservation.failed.inventory.dead.queue
  routing-key:
    order-created: order.created
    order-cancelled: order.cancelled
    stock-reserved: stock.reserved
    stock-reservation-failed: stock.reservation.failed